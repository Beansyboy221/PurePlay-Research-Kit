[workspace]
name = "PurePlay-Research-Kit"
description = "Free, Open-Source Tool for Anti-Cheat Research and Development"
version = "1.0.0"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "==3.11"
pyarrow = "*"
pyarrow-stubs = "*"
pandas = "*"
polars = "*"
optuna = "*"
optuna-integration = "*"
scikit-learn = "*"
tensorboard = "*"
plotly = "*"

[target.win-64.dependencies]
pywin32 = "*"
cuda-toolkit = "*"
cudnn = "*"

[target.linux-64.dependencies]
evdev = "*"
cuda-toolkit = "*"
cudnn = "*"

[pypi-dependencies]
sk2torch = "*"  # Replace with hummingbird-ml or nvtabular for >=3.14?
beanml = "*"
beaninput = "*"
beanapp = "*"

[tasks]
app = "python source/main.py"
